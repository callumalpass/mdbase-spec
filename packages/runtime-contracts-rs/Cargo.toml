[package]
name = "mdbase-runtime-contracts-rs"
version = "0.0.0"
edition = "2021"
publish = false
description = "Prototype Rust validation harness for mdbase v0.3 runtime contracts."

[lib]
name = "mdbase_runtime_contracts"
path = "src/lib.rs"

[dependencies]
jsonschema = { version = "0.18", features = ["draft202012"] }
serde_json = "1"
serde_yaml = "0.9"
walkdir = "2"
