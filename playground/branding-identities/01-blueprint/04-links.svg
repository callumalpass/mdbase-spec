<svg width="1200" height="676" viewBox="0 0 1200 676" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Blueprint Systems: Links</title>
  <desc id="desc">Blueprint identity study for Links.</desc>
  <defs>
    <pattern id="minorGrid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" class="grid"/></pattern>
    <pattern id="majorGrid" width="160" height="160" patternUnits="userSpaceOnUse"><path d="M160 0H0V160" class="major"/></pattern>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="13"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.06"/></feComponentTransfer>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="9" flood-color="#1e1919" flood-opacity="0.16"/>
    </filter>
