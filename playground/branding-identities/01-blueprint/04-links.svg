    .tiny { fill: #9eeeff; font: 650 17px "Azeret Mono", "DejaVu Sans Mono", monospace; letter-spacing: 0; }
    .tag { fill: #081d33; font: 800 17px "Azeret Mono", "DejaVu Sans Mono", monospace; letter-spacing: 0; }
