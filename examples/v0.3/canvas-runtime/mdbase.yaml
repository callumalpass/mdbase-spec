spec_version: "0.3.0"

settings:
  types_folder: _types
  record_extensions: [md]
  validation: error
  explicit_type_keys: [type, types]
  id_field: id
  exclude:
    - ".git/**"
    - ".mdbase/**"

runtime:
  profile_version: "0.1.0"
  enabled: true
  contract_mode: runtime
  policy: policies/local-runtime.md
  materialize:
    implicit_contracts: annotate
    runs: checkpoint
