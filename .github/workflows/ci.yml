name: ci

on:
  push:
  pull_request:

jobs:
  spec-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Conformance level guardrail
        run: python scripts/check_test_levels.py

  runtime-package:
    name: runtime package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: packages/runtime-contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/runtime-contracts/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test package
        run: npm test
      - name: Verify package contents
        run: npm pack --dry-run
